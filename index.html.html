<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WBTI · 你是哪种打工人</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #F5F0E8;
  --bg2: #EDE7D9;
  --ink: #1A1614;
  --ink2: #4A3F38;
  --ink3: #8C7B70;
  --accent: #C8401A;
  --accent2: #E8A030;
  --border: #C4B8AC;
  --card: #FDFAF5;
  --green: #2D6A4F;
  --mono: 'Space Mono', monospace;
  --serif: 'Noto Serif SC', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: var(--serif); min-height: 100vh; overflow-x: hidden; }

.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ── INTRO ── */
#intro { align-items: center; justify-content: center; padding: 2rem 1.5rem; position: relative; overflow: hidden; }
#intro::before {
  content: 'WBTI';
  position: absolute;
  font-family: var(--mono);
  font-size: 28vw;
  font-weight: 700;
  color: transparent;
  -webkit-text-stroke: 1px var(--border);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  white-space: nowrap;
  opacity: 0.4;
}
.intro-inner { position: relative; z-index: 1; text-align: center; max-width: 360px; }
.intro-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 4px 12px;
  margin-bottom: 20px;
}
.intro-title { font-size: clamp(30px, 9vw, 46px); font-weight: 700; line-height: 1.2; margin-bottom: 12px; color: var(--ink); }
.intro-sub { font-size: 14px; color: var(--ink2); margin-bottom: 28px; line-height: 1.8; }
.intro-sub em { color: var(--accent); font-style: normal; }
.intro-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 32px; }
.stat { text-align: center; }
.stat-num { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--accent); display: block; }
.stat-label { font-size: 11px; color: var(--ink3); display: block; margin-top: 2px; }
.btn-start {
  display: block; width: 100%; max-width: 280px; margin: 0 auto;
  padding: 16px; background: var(--ink); color: var(--bg);
  font-family: var(--serif); font-size: 16px; font-weight: 600;
  border: none; cursor: pointer; transition: transform 0.1s;
}
.btn-start:active { transform: scale(0.97); }

/* ── QUIZ ── */
#quiz { padding: 0; }
.quiz-header {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card);
  position: sticky; top: 0; z-index: 10;
}
.quiz-label { font-family: var(--mono); font-size: 11px; color: var(--ink3); letter-spacing: 0.1em; }
.quiz-header-right { display: flex; align-items: center; gap: 12px; }
.progress-track { width: 100px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
.quiz-body { padding: 2rem 1.5rem; flex: 1; }
.q-number { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 12px; }
.q-text { font-size: clamp(16px, 4.5vw, 20px); font-weight: 600; line-height: 1.6; margin-bottom: 28px; color: var(--ink); }
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  width: 100%; text-align: left; padding: 14px 16px;
  background: var(--card); border: 1px solid var(--border);
  font-family: var(--serif); font-size: 14px; line-height: 1.6; color: var(--ink2);
  cursor: pointer; transition: all 0.15s;
}
.opt-btn::before { content: attr(data-letter); font-family: var(--mono); font-size: 11px; color: var(--ink3); margin-right: 10px; }
.opt-btn:active, .opt-btn.selected { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.opt-btn.selected::before { color: var(--accent2); }
.btn-back {
  background: none; border: 1px solid var(--border);
  font-family: var(--mono); font-size: 11px; color: var(--ink3);
  padding: 5px 10px; cursor: pointer; letter-spacing: 0.05em;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--ink2); color: var(--ink2); }
.btn-back:disabled { opacity: 0.3; cursor: default; }

/* ── LOADING ── */
#loading { align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
.loading-emoji { font-size: 48px; animation: spin 1.5s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.loading-text { font-family: var(--mono); font-size: 12px; color: var(--ink3); letter-spacing: 0.1em; }

/* ── RESULT ── */
#result { padding: 0; }
.result-hero {
  background: var(--ink); color: var(--bg);
  padding: 2.5rem 1.5rem 2rem;
  position: relative; overflow: hidden;
}
.result-hero::after {
  content: attr(data-code);
  position: absolute; font-family: var(--mono); font-size: 18vw; font-weight: 700;
  color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.08);
  right: -2vw; bottom: -2vw; pointer-events: none; line-height: 1;
}
.result-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; color: var(--accent2); margin-bottom: 12px; display: block; }
.result-emoji { font-size: 52px; margin-bottom: 10px; display: block; }
.result-name { font-size: clamp(28px, 8vw, 40px); font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
.result-archetype { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 16px; }
.result-sting { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.85); border-left: 2px solid var(--accent); padding-left: 12px; position: relative; z-index: 1; }

.result-body { padding: 1.5rem; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.rtag { font-family: var(--mono); font-size: 10px; padding: 3px 10px; border: 1px solid var(--border); color: var(--ink3); letter-spacing: 0.05em; }
.result-desc { font-size: 14px; line-height: 1.85; color: var(--ink2); margin-bottom: 24px; }

.quad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
.quad-item { background: var(--bg2); padding: 12px; border-left: 2px solid var(--border); }
.quad-item.danger { border-left-color: var(--accent); }
.quad-item.power { border-left-color: var(--accent2); }
.quad-ql { font-family: var(--mono); font-size: 9px; color: var(--ink3); letter-spacing: 0.08em; margin-bottom: 5px; }
.quad-qv { font-size: 12px; line-height: 1.55; color: var(--ink); }

.quote-wrap {
  border: 1px solid var(--border); padding: 20px 18px 16px;
  background: var(--card); margin-bottom: 24px; position: relative;
}
.quote-wrap::before {
  content: '"'; position: absolute; top: -14px; left: 14px;
  font-size: 48px; color: var(--accent); font-family: Georgia, serif; line-height: 1;
}
.quote-text { font-size: 13px; line-height: 1.9; color: var(--ink2); font-style: italic; margin-bottom: 8px; padding-top: 4px; }
.quote-src { font-family: var(--mono); font-size: 10px; color: var(--ink3); letter-spacing: 0.05em; }

/* ── BREAKTHROUGH ── */
.breakthrough-wrap { margin-bottom: 24px; }
.bt-title {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  color: var(--green); border: 1px solid var(--green);
  display: inline-block; padding: 3px 10px; margin-bottom: 14px;
}
.bt-item { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
.bt-num {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  color: var(--accent); flex-shrink: 0; width: 20px; padding-top: 1px;
}
.bt-text { font-size: 13px; line-height: 1.8; color: var(--ink2); }
.bt-text strong { color: var(--ink); font-weight: 600; }

/* ── SHARE ── */
.share-section { background: var(--bg2); border: 1px solid var(--border); padding: 20px; text-align: center; margin-bottom: 12px; }
.share-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.share-sub { font-size: 12px; color: var(--ink3); line-height: 1.7; margin-bottom: 16px; }
.btn-share {
  display: block; width: 100%; padding: 14px;
  background: var(--accent); color: white;
  font-family: var(--serif); font-size: 15px; font-weight: 600;
  border: none; cursor: pointer; margin-bottom: 10px; transition: opacity 0.15s;
}
.btn-share:active { opacity: 0.85; }
.btn-save-img {
  display: block; width: 100%; padding: 14px;
  background: var(--ink); color: var(--bg);
  font-family: var(--serif); font-size: 15px; font-weight: 600;
  border: none; cursor: pointer; margin-bottom: 10px; transition: opacity 0.15s;
}
.btn-save-img:active { opacity: 0.8; }
.btn-retry {
  display: block; width: 100%; padding: 13px;
  background: transparent; color: var(--ink2);
  font-family: var(--serif); font-size: 14px;
  border: 1px solid var(--border); cursor: pointer;
}
.wbti-footer { text-align: center; padding: 16px; font-family: var(--mono); font-size: 10px; color: var(--ink3); letter-spacing: 0.08em; }

/* ── IMAGE PREVIEW MODAL ── */
.img-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 100;
  flex-direction: column; align-items: center; justify-content: center;
  padding: 20px;
}
.img-modal.active { display: flex; }
.img-modal img { max-width: 100%; max-height: 70vh; border-radius: 4px; display: block; }
.img-modal-hint { font-family: var(--mono); font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 14px; text-align: center; line-height: 1.8; }
.img-modal-close { margin-top: 16px; padding: 10px 28px; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; font-family: var(--serif); font-size: 14px; cursor: pointer; border-radius: 2px; }

.screen { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" class="screen active">
  <div class="intro-inner">
    <div class="intro-badge">WBTI · 2026</div>
    <div class="intro-title">你是哪种<br>打工人？</div>
    <div class="intro-sub">10种职场原型，总有一个<em>精准戳中你</em><br>测完记得@你觉得最像的同事</div>
    <div class="intro-stats">
      <div class="stat"><span class="stat-num">10</span><span class="stat-label">种原型</span></div>
      <div class="stat"><span class="stat-num">15</span><span class="stat-label">道题目</span></div>
      <div class="stat"><span class="stat-num">3min</span><span class="stat-label">搞定</span></div>
    </div>
    <button class="btn-start" onclick="startQuiz()">开始测试 →</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <span class="quiz-label">WBTI · <span id="q-counter">1/15</span></span>
    <div class="quiz-header-right">
      <button class="btn-back" id="btn-back" onclick="goBack()" disabled>← 上一题</button>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="quiz-body">
    <div class="q-number" id="q-number">Q01</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
  <div class="loading-emoji">⚙️</div>
  <div class="loading-text">正在分析你的打工DNA...</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-hero" id="result-hero">
    <span class="result-tag">WBTI · 职场原型测试 · 2026</span>
    <span class="result-emoji" id="result-emoji"></span>
    <div class="result-name" id="result-name"></div>
    <div class="result-archetype" id="result-archetype"></div>
    <div class="result-sting" id="result-sting"></div>
  </div>
  <div class="result-body">
    <div class="tag-row" id="result-tags"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="quad-grid" id="result-quads"></div>
    <div class="quote-wrap">
      <div class="quote-text" id="quote-text"></div>
      <div class="quote-src" id="quote-src"></div>
    </div>
    <div class="breakthrough-wrap">
      <div class="bt-title">破局建议</div>
      <div id="breakthrough-items"></div>
    </div>
    <div class="share-section">
      <div class="share-sub">@你身边的「背刺专家」「职场演员」「画饼受害者」<br>让他们也来对号入座</div>
      <button class="btn-save-img" onclick="generateShareImage()">📸 生成结果图片保存分享</button>
      <button class="btn-share" onclick="handleShare()">🔗 复制链接发给朋友</button>
      <button class="btn-retry" onclick="retryQuiz()">重新测试</button>
    </div>
    <div class="wbti-footer">WBTI · 职场原型测试 · 2026 · 非商业用途</div>
  </div>
</div>

<!-- IMAGE MODAL -->
<div class="img-modal" id="img-modal">
  <img id="share-img-preview" src="" alt="结果图片">
  <div class="img-modal-hint">长按图片保存到相册<br>发朋友圈或微信群，扫码可直接测试</div>
  <button class="img-modal-close" onclick="closeImgModal()">关闭</button>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    text: "周五下班前，老板突然说「这个方案周一要用，周末帮忙完善一下」，你第一反应是？",
    opts: [
      { text: "直接问需要完善哪几个部分，立刻开始拆任务", scores: {A:1} },
      { text: "默默打开电脑，什么都不说", scores: {A:-1} },
      { text: "发消息问能不能周一早上来了再做", scores: {C:1} },
      { text: "心里骂了一句但还是做了，顺便截图备份", scores: {C:-1} }
    ]
  },
  {
    text: "遇到一个棘手的跨部门问题，你最先想到的是？",
    opts: [
      { text: "找认识的人先打个招呼，关系到位事情好办", scores: {B:1} },
      { text: "自己先研究清楚再说，不想欠人情", scores: {B:-1} },
      { text: "拉个群，@所有相关人，流程走起来", scores: {B:1} },
      { text: "发邮件留记录，该谁的锅谁背", scores: {A:-1} }
    ]
  },
  {
    text: "连续被PUA三次之后，你的反应更接近？",
    opts: [
      { text: "在工位上保持平静，回家之后崩了", scores: {C:-1} },
      { text: "当场没说什么，但写了一封很长的邮件然后删掉了", scores: {C:-1} },
      { text: "直接怼回去，哪怕后来后悔", scores: {C:1} },
      { text: "开始悄悄更新简历", scores: {A:1} }
    ]
  },
  {
    text: "你更认同哪句话？",
    opts: [
      { text: "职位越高，掌控越多", scores: {D:1} },
      { text: "稳定比什么都重要，别折腾", scores: {D:-1} },
      { text: "做好眼前的事，机会自然来", scores: {D:-1} },
      { text: "不往上走就是往下走，没有原地", scores: {D:1} }
    ]
  },
  {
    text: "团队出了问题，责任归属不明，你的第一动作是？",
    opts: [
      { text: "先把事情解决，责任的事之后再说", scores: {A:1} },
      { text: "翻出之前的消息记录，确认自己没问题", scores: {A:-1} },
      { text: "找到最有可能背锅的人，提前沟通一下", scores: {B:1} },
      { text: "沉默，等别人先开口", scores: {A:-1} }
    ]
  },
  {
    text: "年会抽签坐位置，你希望坐在？",
    opts: [
      { text: "老板旁边，难得的表现机会", scores: {B:1, D:1} },
      { text: "自己部门的人旁边，聊得来比较重要", scores: {B:-1} },
      { text: "角落，吃完赶紧走", scores: {D:-1} },
      { text: "不在乎，反正年会没什么意义", scores: {C:-1} }
    ]
  },
  {
    text: "一个不合理的需求在群里发出来了，你的反应？",
    opts: [
      { text: "私信对方解释为什么做不到", scores: {C:-1} },
      { text: "群里直接说「这个时间线不现实」", scores: {C:1} },
      { text: "先回复「收到」，然后看看怎么拖", scores: {A:-1} },
      { text: "不回复，等别人先表态", scores: {A:-1} }
    ]
  },
  {
    text: "你觉得自己现在的工作状态是？",
    opts: [
      { text: "在积累，随时准备跳更高的台阶", scores: {D:1} },
      { text: "能过就过，别给自己找麻烦", scores: {D:-1} },
      { text: "不知道，做着做着就到现在了", scores: {C:-1} },
      { text: "随时可以不干，但还没找到更好的", scores: {C:1} }
    ]
  },
  {
    text: "如果今天可以完全「隐形」——没人找你，没消息，你会？",
    opts: [
      { text: "感觉很爽，这才是理想工作状态", scores: {D:-1} },
      { text: "有点不安，万一错过什么重要消息", scores: {D:1} },
      { text: "趁机把自己的事推进一大截", scores: {A:1} },
      { text: "睡觉", scores: {A:-1} }
    ]
  },
  {
    text: "你觉得自己在公司存活到现在，主要靠的是？",
    opts: [
      { text: "和大家关系不错，没人想弄我", scores: {B:1} },
      { text: "我做的东西别人做不了", scores: {B:-1} },
      { text: "干一天是一天，做好份内事就行", scores: {A:-1, D:-1} },
      { text: "从不惹麻烦，从不被注意", scores: {A:-1} }
    ]
  },
  {
    text: "月底看到工资条，比预期少了一截，你？",
    opts: [
      { text: "立刻找HR或者老板问清楚", scores: {C:1, A:1} },
      { text: "心里难受，嘴上没说，默默记着", scores: {C:-1} },
      { text: "打开招聘软件刷了一个小时", scores: {A:1} },
      { text: "算了，懒得搞这些", scores: {D:-1} }
    ]
  },
  {
    text: "新来了一个同事，比你年轻，薪资据说比你高，你？",
    opts: [
      { text: "去跟他打好关系，说不定以后有用", scores: {B:1} },
      { text: "默默观察他的水平，看看有没有传言那么强", scores: {B:-1} },
      { text: "内心翻涌但表现正常，回家睡不着", scores: {C:-1} },
      { text: "没什么感觉，各人有各人的命", scores: {D:-1} }
    ]
  },
  {
    text: "项目做到一半发现方向有问题，你最可能做的是？",
    opts: [
      { text: "立刻拉会，重新对齐方向", scores: {A:1} },
      { text: "先做完这部分，问题留给下一阶段再说", scores: {A:-1} },
      { text: "跟最近的同事小声说一句，看看别人怎么看", scores: {B:1} },
      { text: "写了个备注发给负责人，证明我提过", scores: {A:-1} }
    ]
  },
  {
    text: "五年后，你最希望自己处于哪种状态？",
    opts: [
      { text: "带团队，有决策权", scores: {D:1} },
      { text: "还在做现在的事，但做得更好", scores: {D:-1, B:-1} },
      { text: "不在这个公司了", scores: {C:1} },
      { text: "不知道，想这个太累了", scores: {C:-1} }
    ]
  },
  {
    text: "如果用一种动物描述你的职场状态，你选？",
    opts: [
      { text: "蜗牛——慢但从不停，壳就是我的底线", scores: {C:-1, D:-1} },

  if (C>1 && D<=0) return 'BOMB';
  if (A>2 && B>1) return 'BKST';
  if (A>1 && B<=0 && D>0) return 'BURN';
  if (A>1 && B>0 && D>0) return 'ACTR';
  if (A>0 && B<=0 && D<=0) return 'BULL';
  if (B>1 && D>0 && A<=0) return 'ACTR';
  if (B>0 && D<=0 && C<0) return 'INVS';
  if (D>1 && A<=0 && B<=0) return 'BAIT';
  if (D<=-1 && C<0 && A<0) return 'FISH';
  if (C<-1 && A<0 && B<0) return 'BLME';
  if (A<-1 && B<-1) return 'MALO';
  if (C>0 && A<0) return 'BOMB';
  if (B>0 && D<0) return 'INVS';
  return 'MALO';
}

let currentQ = 0;
let scores = {A:0,B:0,C:0,D:0};
let answers = new Array(15).fill(null);
let answered = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz() {
  currentQ = 0;
  scores = {A:0,B:0,C:0,D:0};
  answers = new Array(15).fill(null);
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const letters = ['A','B','C','D'];
  document.getElementById('q-counter').textContent = `${currentQ+1}/15`;
  document.getElementById('q-number').textContent = `Q${String(currentQ+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-fill').style.width = `${(currentQ/15)*100}%`;
  document.getElementById('btn-back').disabled = currentQ === 0;

  const container = document.getElementById('options');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[currentQ] === i ? ' selected' : '');
    btn.setAttribute('data-letter', letters[i]);
    btn.textContent = opt.text;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
  answered = answers[currentQ] !== null;
}

function selectAnswer(idx) {
  // Remove old answer scores if re-answering
  if (answers[currentQ] !== null) {
    const old = QUESTIONS[currentQ].opts[answers[currentQ]].scores;
    Object.keys(old).forEach(k => { scores[k] = (scores[k]||0) - old[k]; });
  }
  answers[currentQ] = idx;
  answered = true;

  const s = QUESTIONS[currentQ].opts[idx].scores;
  Object.keys(s).forEach(k => { scores[k] = (scores[k]||0) + s[k]; });

  document.querySelectorAll('.opt-btn').forEach((b,i) => {
    b.classList.toggle('selected', i === idx);
  });

  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      renderQuestion();
    } else {
      showScreen('loading');
      setTimeout(showResult, 1800);
    }
  }, 340);
}

function goBack() {
  if (currentQ === 0) return;
  currentQ--;
  renderQuestion();
}

function showResult() {
  const key = calcPersona(scores);
  const p = PERSONAS[key];

  document.getElementById('result-hero').setAttribute('data-code', key);
  document.getElementById('result-emoji').textContent = p.emoji;
  document.getElementById('result-name').textContent = p.name;
  document.getElementById('result-archetype').textContent = p.archetype;
  document.getElementById('result-sting').textContent = p.sting;
  document.getElementById('result-desc').textContent = p.desc;
  document.getElementById('quote-text').textContent = p.quote;
  document.getElementById('quote-src').textContent = p.quoteSrc;

  document.getElementById('result-tags').innerHTML = p.tags.map(t=>`<span class="rtag">${t}</span>`).join('');

  document.getElementById('result-quads').innerHTML = p.quads.map(q=>
    `<div class="quad-item ${q.type}"><div class="quad-ql">${q.label}</div><div class="quad-qv">${q.val}</div></div>`
  ).join('');

  document.getElementById('breakthrough-items').innerHTML = p.breakthrough.map((b,i)=>
    `<div class="bt-item">
      <div class="bt-num">0${i+1}</div>
      <div class="bt-text"><strong>${b.title}</strong><br>${b.text}</div>
    </div>`
  ).join('');

  showScreen('result');
}

function handleShare() {
  if (navigator.share) {
    navigator.share({
      title: 'WBTI · 你是哪种打工人',
      text: '测测你是哪种职场原型，结果很准，测完记得@同事！',
      url: window.location.href
    }).catch(()=>{});
  } else {
    const el = document.createElement('textarea');
    el.value = window.location.href;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert('链接已复制！发给朋友，让他们也来测测 →');
  }
}

// ── SHARE IMAGE GENERATOR ──
const SITE_URL = 'REPLACE_WITH_YOUR_URL'; // 上线后替换为真实链接

function generateShareImage() {
  const key = document.getElementById('result-hero').getAttribute('data-code');
  const p = PERSONAS[key];
  const dpr = window.devicePixelRatio || 2;
  const W = 750, H = 1100;

  const canvas = document.createElement('canvas');
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Background
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(0, 0, W, H);

  // Top dark band
  ctx.fillStyle = '#1A1614';
  ctx.fillRect(0, 0, W, 420);

  // Watermark code text
  ctx.save();
  ctx.font = 'bold 160px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.textAlign = 'right';
  ctx.fillText(key, W - 20, 400);
  ctx.restore();

  // Badge
  ctx.font = '22px monospace';
  ctx.fillStyle = '#E8A030';
  ctx.textAlign = 'left';
  ctx.fillText('WBTI · 职场原型测试 · 2026', 48, 60);

  // Emoji
  ctx.font = '96px serif';
  ctx.textAlign = 'left';
  ctx.fillText(p.emoji, 44, 170);

  // Name
  ctx.font = 'bold 72px serif';
  ctx.fillStyle = '#FDFAF5';
  ctx.textAlign = 'left';
  ctx.fillText(p.name, 48, 260);

  // Archetype
  ctx.font = '22px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(p.archetype, 48, 300);

  // Sting quote line
  ctx.fillStyle = '#C8401A';
  ctx.fillRect(48, 326, 4, 52);
  ctx.font = '26px serif';
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  const stingLines = wrapText(ctx, p.sting, W - 120);
  stingLines.forEach((line, i) => ctx.fillText(line, 62, 355 + i * 34));

  // Tags row
  const tags = p.tags;
  let tx = 48;
  ctx.font = '20px monospace';
  tags.forEach(tag => {
    const tw = ctx.measureText(tag).width + 24;
    ctx.strokeStyle = '#C4B8AC';
    ctx.lineWidth = 1;
    ctx.strokeRect(tx, 440, tw, 34);
    ctx.fillStyle = '#8C7B70';
    ctx.fillText(tag, tx + 12, 462);
    tx += tw + 10;
  });

  // Desc
  ctx.font = '24px serif';
  ctx.fillStyle = '#4A3F38';
  ctx.textAlign = 'left';
  const descLines = wrapText(ctx, p.desc, W - 96);
  descLines.slice(0, 5).forEach((line, i) => ctx.fillText(line, 48, 510 + i * 36));

  // Divider
  ctx.strokeStyle = '#C4B8AC';
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(48, 700); ctx.lineTo(W - 48, 700); ctx.stroke();

  // Quad grid
  const quads = p.quads;
  const qW = (W - 120) / 2, qH = 100;
  quads.forEach((q, i) => {
    const col = i % 2, row = Math.floor(i / 2);
    const qx = 48 + col * (qW + 24), qy = 716 + row * (qH + 12);
    ctx.fillStyle = '#EDE7D9';
    ctx.fillRect(qx, qy, qW, qH);
    const accentColor = q.type === 'danger' ? '#C8401A' : q.type === 'power' ? '#E8A030' : '#C4B8AC';
    ctx.fillStyle = accentColor;
    ctx.fillRect(qx, qy, 3, qH);
    ctx.font = '18px monospace';
    ctx.fillStyle = '#8C7B70';
    ctx.fillText(q.label, qx + 14, qy + 26);
    ctx.font = '20px serif';
    ctx.fillStyle = '#1A1614';
    const vLines = wrapText(ctx, q.val, qW - 28);
    vLines.slice(0,2).forEach((l,li) => ctx.fillText(l, qx + 14, qy + 52 + li * 26));
  });

  // QR code area
  const qrY = 940;
  ctx.fillStyle = '#FDFAF5';
  ctx.fillRect(48, qrY, 120, 120);
  ctx.strokeStyle = '#C4B8AC';
  ctx.lineWidth = 1;
  ctx.strokeRect(48, qrY, 120, 120);

  // Draw QR or placeholder
  if (SITE_URL !== 'REPLACE_WITH_YOUR_URL') {
    drawQRPlaceholder(ctx, 48, qrY, 120, SITE_URL);
  } else {
    // Placeholder pattern
    ctx.fillStyle = '#C4B8AC';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('扫码测试', 108, qrY + 68);
    ctx.fillText('WBTI', 108, qrY + 88);
    // Simple grid pattern
    ctx.fillStyle = '#8C7B70';
    for(let r=0;r<5;r++) for(let c=0;c<5;c++) {
      if ((r+c)%2===0) ctx.fillRect(58+c*18, qrY+10+r*18, 14, 14);
    }
  }

  ctx.font = '22px serif';
  ctx.fillStyle = '#4A3F38';
  ctx.textAlign = 'left';
  ctx.fillText('扫码测试你是哪种打工人', 188, qrY + 44);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#8C7B70';
  ctx.fillText('WBTI · 职场原型测试', 188, qrY + 72);
  ctx.fillText('@同事一起测，看看他们是哪种', 188, qrY + 96);

  // Bottom line
  ctx.fillStyle = '#C8401A';
  ctx.fillRect(0, H - 6, W, 6);

  const dataUrl = canvas.toDataURL('image/png');
  document.getElementById('share-img-preview').src = dataUrl;
  document.getElementById('img-modal').classList.add('active');
}

function drawQRPlaceholder(ctx, x, y, size, url) {
  // Simple QR-like visual using URL hash as seed
  const s = url.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const cell = size / 10;
  ctx.fillStyle = '#1A1614';
  for(let r=0;r<10;r++) for(let c=0;c<10;c++) {
    if ((s*r+c*7+r*c)%3 !== 0) ctx.fillRect(x+c*cell, y+r*cell, cell-1, cell-1);
  }
  // Finder squares
  [[0,0],[0,7],[7,0]].forEach(([fr,fc])=>{
    ctx.fillStyle='#1A1614';
    ctx.fillRect(x+fc*cell,y+fr*cell,3*cell,3*cell);
    ctx.fillStyle='#F5F0E8';
    ctx.fillRect(x+fc*cell+cell*0.3,y+fr*cell+cell*0.3,cell*2.4,cell*2.4);
    ctx.fillStyle='#1A1614';
    ctx.fillRect(x+fc*cell+cell*0.8,y+fr*cell+cell*0.8,cell*1.4,cell*1.4);
  });
}

function wrapText(ctx, text, maxWidth) {
  const chars = text.split('');
  const lines = [];
  let line = '';
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function closeImgModal() {
  document.getElementById('img-modal').classList.remove('active');
}

function retryQuiz() { startQuiz(); }
